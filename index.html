<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BD Smart Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>📅 BD Smart Calendar</h1>

  <div class="clock" id="time">00:00:00</div>

  <div class="card">
    <h2>English Date</h2>
    <p id="engDate"></p>
  </div>

  <div class="card">
    <h2>Arabic (Hijri)</h2>
    <p id="hijriDate"></p>
  </div>

  <div class="card">
    <h2>Bangla Date</h2>
    <p id="banglaDate"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
